events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        # Honeypot: Catch-all for suspicious patterns
        location ~* /(admin|wp-admin|wp-login|\.env|\.git|phpmyadmin) {
            proxy_pass http://honeypot:8080;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Main Application
        location / {
            proxy_pass http://web:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}