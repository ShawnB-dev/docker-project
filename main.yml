name: Docker CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the stack
        run: docker-compose build

      - name: Run containers
        run: docker-compose up -d

      - name: Check health
        run: |
          sleep 15
          docker-compose ps | grep "(healthy)"